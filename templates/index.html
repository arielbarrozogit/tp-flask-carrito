<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coffee Carrito UNO</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">

    
        <!-- CSS propio -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">


</head>


<body>

<div class="container py-4">

    <h1 class="text-center mb-4">
        <i class="bi bi-cup-hot-fill"></i>
        Coffee Carrito UNO
    </h1>

    <div class="row">

        <div class="col-md-8">

            <h3>Productos</h3>

            <div id="productos" class="row g-3">

            </div>

        </div>

        <div class="col-md-4">

            <div class="card carrito-card">

                <div class="card-header">
                    🛒 Mi carrito
                </div>

                <div class="card-body">

                    <div id="carrito">

                    </div>

                    <hr>

                    <h4 id="total">
                        Total: $0
                    </h4>
                    
                    <div class="mt-3">

                        <button
                            class="btn btn-outline-danger w-100"
                            onclick="vaciarCarrito()"
                        >
                            🗑️ Vaciar carrito
                        </button>


                </div>

            </div>

        </div>

    </div>

</div>

<script
    src="{{ url_for('static', filename='js/app.js') }}">
</script>

</body>
</html>
